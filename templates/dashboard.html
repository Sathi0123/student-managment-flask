<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Student Management System</h3>

<div class="row">

<div class="col-md-4">
<input id="name" class="form-control" placeholder="Name">
</div>

<div class="col-md-3">
<input id="age" class="form-control" placeholder="Age">
</div>

<div class="col-md-3">
<input id="course" class="form-control" placeholder="Course">
</div>

<div class="col-md-2">
<button class="btn btn-success w-100" onclick="saveStudent()">Save</button>
</div>

</div>

<hr>

<div class="mb-3">
<input id="search" class="form-control" placeholder="Search by name">
</div>

<button class="btn btn-primary mb-3" onclick="loadStudents()">Load Students</button>

<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>
</div>

<script>

let oldId = ""

async function saveStudent(){

    const name = document.getElementById("name").value
    const age = document.getElementById("age").value
    const course = document.getElementById("course").value

    if(name=="" || age=="" || course==""){
        alert("Fill all fields")
        return
    }

    if(oldId==""){

        await fetch("/add",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,age,course})
        })

        alert("Student Added")

    }else{

        await fetch("/update/"+oldId,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,age,course})
        })

        alert("Student Updated")
        oldId=""
    }

    document.getElementById("name").value=""
    document.getElementById("age").value=""
    document.getElementById("course").value=""

    loadStudents()
}

async function del(id){

    await fetch("/delete/"+id,{
        method:"DELETE"
    })

    loadStudents()
}

function fill(id,name,age,course){

    document.getElementById("name").value=name
    document.getElementById("age").value=age
    document.getElementById("course").value=course

    oldId=id
}

async function loadStudents(){

    const res = await fetch("/students")
    const data = await res.json()

    const key = document.getElementById("search").value.toLowerCase()

    const list = document.getElementById("list")
    list.innerHTML=""

    data.forEach(s=>{

        if(s.name.toLowerCase().includes(key)){

            list.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.age}</td>
                <td>${s.course}</td>
                <td>
                    <button class="btn btn-warning btn-sm"
                        onclick="fill('${s._id}','${s.name}','${s.age}','${s.course}')">
                        Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                        onclick="del('${s._id}')">
                        Delete
                    </button>
                </td>
            </tr>`
        }
    })
}

</script>

</body>
</html>
